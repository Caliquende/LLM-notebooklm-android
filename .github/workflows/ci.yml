name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Run Android lint
        run: ./gradlew lintDebug --stacktrace

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

  bridge-server:
    name: Bridge server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: bridge-server/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r bridge-server/requirements.txt

      - name: Compile Python sources
        run: python -m py_compile bridge-server/server.py

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install and scan bridge-server dependencies
        run: |
          python -m pip install -r bridge-server/requirements.txt
          pip install bandit[toml] pip-audit

      - name: Run Bandit on bridge-server
        run: |
          bandit -r bridge-server/ -f screen --severity-level medium --confidence-level medium || true

      - name: Run pip-audit
        run: |
          pip-audit || true

      - name: Check for hardcoded secrets
        run: |
          FOUND=0
          for pattern in "sk-" "api_key" "apiKey" "secret_key" "password" "BEGIN RSA PRIVATE KEY"; do
            if grep -rlI "$pattern" --include="*.kt" --include="*.java" --include="*.py" --include="*.xml" . 2>/dev/null | grep -v ".git/" | grep -v "SECURITY.md"; then
              echo "Warning: Potential secret pattern found: $pattern"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 0 ]; then
            echo "No hardcoded secrets detected."
          fi

